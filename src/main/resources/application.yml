spring:
  application:
    name: praesto
  ai:
    openai:
      # Default "local-dev" erlaubt App-Start ohne echten Key (Chat antwortet dann mit Fallback)
      api-key: ${OPEN_AI_KEY:local-dev}

  data:
    mongodb:
      # Default = lokale MongoDB (Docker). In Prod via MONGODB_URI überschrieben.
      uri: ${MONGODB_URI:mongodb://localhost:27017/Praesto}
      database: Praesto

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  # E-Mail (optional): nur aktiv wenn MAIL_HOST gesetzt ist. Sonst werden
  # Kontaktanfragen nur in der DB gespeichert (Super-Admin → "Anfragen").
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

praesto:
  jwt:
    secret: ${JWT_SECRET}          # min 256-bit (32 Bytes), in Azure App Settings
    expiration-hours: 24
  super-admin:
    email: ${SUPER_ADMIN_EMAIL}
    password: ${SUPER_ADMIN_PASSWORD}
  demo:
    school-name: "Demo Schule Praesto"
  contact:
    recipient: ${CONTACT_RECIPIENT_EMAIL:}
    from: ${MAIL_FROM:}
