# Test-Konfiguration: laeuft ohne externe MongoDB und ohne gesetzte Umgebungsvariablen.

# --- Eingebettete MongoDB (flapdoodle spring3x) ---
# Version, die flapdoodle herunterlaedt und startet. Beim ersten Lauf Netzwerk noetig.
# In flapdoodle 4.x heisst die Property "de.flapdoodle.mongodb.embedded.version".
de.flapdoodle.mongodb.embedded.version=7.0.14
# Die embedded-Auto-Config setzt den Port/Host dynamisch; spring-data verbindet sich darauf.
spring.data.mongodb.database=praesto_test

# --- JWT: Pflicht-Secret (>=32 Bytes), sonst startet der Context nicht ---
praesto.jwt.secret=test-secret-test-secret-test-secret-1234567890
praesto.jwt.expiration-hours=24

# --- SuperAdmin-Seeder ueberspringen (leere Werte => Seeder beendet sich frueh) ---
praesto.super-admin.email=
praesto.super-admin.password=

# --- Spring AI / OpenAI: Dummy-Key, ChatModel wird in Tests gemockt ---
spring.ai.openai.api-key=test

# --- Kein echter Mailversand (kein Host gesetzt) ---
spring.mail.host=

# --- Kontakt-Defaults leer ---
praesto.contact.recipient=
praesto.contact.from=
