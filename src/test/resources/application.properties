# Test-Konfiguration: laeuft ohne externe DB und ohne gesetzte Umgebungsvariablen.

# --- H2 In-Memory-DB im PostgreSQL-Kompatibilitaetsmodus ---
spring.datasource.url=jdbc:h2:mem:praesto_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# --- JWT: Pflicht-Secret (>=32 Bytes), sonst startet der Context nicht ---
praesto.jwt.secret=test-secret-test-secret-test-secret-1234567890
praesto.jwt.expiration-hours=24

# --- SuperAdmin-Seeder ueberspringen (leere Werte => Seeder beendet sich frueh) ---
praesto.super-admin.email=
praesto.super-admin.password=

# --- Spring AI / Azure OpenAI: Dummy-Werte, ChatModel wird in Tests gemockt ---
spring.ai.azure.openai.api-key=test
spring.ai.azure.openai.endpoint=https://example.openai.azure.com/
spring.ai.azure.openai.chat.options.deployment-name=test

# --- Kein echter Mailversand (kein Host gesetzt) ---
spring.mail.host=

# --- Kontakt-Defaults leer ---
praesto.contact.recipient=
praesto.contact.from=

# --- KI-Kontingente in Tests faktisch unbegrenzt (Limits werden separat getestet) ---
praesto.ai.limit.practice-interview=100000
praesto.ai.limit.cv=100000
praesto.ai.limit.cover-letter=100000
